name: common_place_book
description: A beautiful digital commonplace book for storing and rediscovering golden nuggets of wisdom, quotes, and ideas.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  bloc: ^8.1.2

  # Database
  drift: ^2.14.1
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.18
  sqlite3: ^2.4.0  # For web WASM support

  # Routing
  go_router: ^13.0.1

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  path_provider: ^2.1.1
  path: ^1.8.3
  file_picker: ^8.1.6
  share_plus: ^10.1.4
  package_info_plus: ^8.1.0

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # Core Flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  drift_dev: ^2.14.1
  build_runner: ^2.4.7

  # Linting
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # Assets (to be added later)
  # assets:
  #   - assets/images/
  #   - assets/icons/
